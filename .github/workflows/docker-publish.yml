name: docker

# Build the multi-arch image and push it to GHCR so `docker compose up` can
# pull ghcr.io/<owner>/tippani. Runs on pushes to main and on version tags.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # A git tag v1.2.3 -> image tags 1.2.3, 1.2, and latest (latest=auto
          # moves only on non-prerelease semver tags). Pushes to main -> edge +
          # a short-sha tag, so :latest always points at the newest release.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,format=short,enable={{is_default_branch}}
          flavor: |
            latest=auto

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Multi-arch: amd64 is the tested arch; arm64 is published too (pure Go,
          # CGO-free, so it cross-compiles cleanly) but is UNTESTED — shipped so
          # arm64 NAS owners (Synology/QNAP/Pi) can try it and report back.
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: release

# Cut a GitHub Release whenever a version tag (v*) is pushed, using that
# version's CHANGELOG.md section as the release notes. The docker workflow
# already publishes the GHCR image on the same tag; this adds the human-facing
# Release entry so the Releases page stays in step with the tags (previously
# releases were written by hand, which is why v0.4.x had images + tags but no
# Release). Also runnable by hand (workflow_dispatch) against an existing tag to
# backfill a release that was missed.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)publish a Release for, e.g. v0.4.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          tag="${{ github.event.inputs.tag }}"
          tag="${tag:-$GITHUB_REF_NAME}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Extract changelog section
        run: |
          ver='${{ steps.tag.outputs.version }}'
          # Print the lines under "## [<ver>]" up to the next "## " heading.
          # Literal string matching (index/substr), not regex, so the [ ] in the
          # heading and the dots in the version aren't treated as metacharacters.
          awk -v ver="$ver" '
            BEGIN { start = "## [" ver "]" }
            index($0, start) == 1 { grab=1; next }
            grab && substr($0, 1, 3) == "## " { exit }
            grab { print }
          ' CHANGELOG.md > notes.md
          # Drop leading blank lines; fall back to a stub if the section is empty.
          sed -i -e '/./,$!d' notes.md
          if [ ! -s notes.md ]; then
            echo "See CHANGELOG.md and the commit history for details." > notes.md
          fi

      - name: Create or update the Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag='${{ steps.tag.outputs.tag }}'
          # Idempotent: edit an existing Release (e.g. a re-run / backfill),
          # otherwise create it. Omit --latest so GitHub computes "Latest" by
          # semver, which keeps a backfilled older tag from stealing the badge.
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --notes-file notes.md
          else
            gh release create "$tag" --title "$tag" --notes-file notes.md --verify-tag
          fi
